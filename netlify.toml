# ─────────────────────────────────────────────────
#  Samsung Price Monitor — Netlify Configuration
# ─────────────────────────────────────────────────

[build]
  publish   = "."               # 정적 파일 루트 (index.html 위치)
  functions = "netlify/functions" # 서버리스 함수 폴더

[functions]
  node_bundler = "esbuild"      # 빠른 번들링 (axios/cheerio 포함)

# ── CORS 헤더 (Functions 엔드포인트 전용) ─────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://skupricemonitoring.netlify.app"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# ── 로컬 개발 시 CORS 허용 ────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "http://localhost:8888"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# ── 환경변수 예시 (실제 값은 Netlify 대시보드에서 설정) ──
# [context.production.environment]
#   NAVER_CLIENT_ID     = "xxxxxxxxxxxxxxxxxxxx"
#   NAVER_CLIENT_SECRET = "xxxxxxxxxx"
